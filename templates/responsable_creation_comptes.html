<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Création de comptes (Managers) - Responsable Plateau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#f97316',
              primaryDark: '#c2410c',
            }
          }
        }
      }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="h-10 mr-3">
                <h1 class="text-2xl font-bold text-gray-900">Création de comptes Managers</h1>
            </div>
            <div class="flex items-center space-x-6">
                <a href="{{ url_for('responsable_dashboard') }}" class="text-primary hover:text-primaryDark font-medium">
                    ← Retour au dashboard
                </a>
                <a href="{{ url_for('logout') }}" class="text-red-600 hover:text-red-800 font-medium">Déconnexion</a>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="bg-white shadow rounded-xl p-8">
            <h2 class="text-2xl font-semibold text-gray-900 mb-8">Créer un compte Manager</h2>

            <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                    <input type="text" name="nom" required class="block w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:border-primary focus:ring-primary">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
                    <input type="text" name="prenom" required class="block w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:border-primary focus:ring-primary">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
                    <input type="tel" name="numtel" required class="block w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:border-primary focus:ring-primary">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label>
                    <input type="text" name="adresse" required class="block w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:border-primary focus:ring-primary">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required class="block w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:border-primary focus:ring-primary">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                    <input type="password" name="mot_de_passe" required class="block w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:border-primary focus:ring-primary">
                </div>

                <!-- Rôle forcé à manager (non modifiable) -->
                <input type="hidden" name="role" value="manager">

                <div class="md:col-span-2 mt-8">
                    <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-medium py-3.5 px-6 rounded-lg shadow-md hover:shadow-lg transition duration-200">
                        Créer le compte Manager
                    </button>
                </div>
            </form>

            <p class="mt-10 text-center text-sm text-gray-500">
                Seuls les comptes avec rôle <strong>Manager</strong> peuvent être créés depuis cet espace.
            </p>
        </div>

        <p class="mt-8 text-center">
            <a href="{{ url_for('responsable_dashboard') }}" class="text-primary hover:text-primaryDark font-medium">
                ← Retour au dashboard
            </a>
        </p>
    </main>
</body>
</html>
