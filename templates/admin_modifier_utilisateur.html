<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier utilisateur - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#f97316',
              primaryDark: '#c2410c',
            }
          }
        }
      }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="h-10 mr-3">
                <h1 class="text-2xl font-bold text-gray-900">Modifier utilisateur</h1>
            </div>
            <a href="{{ url_for('logout') }}" class="text-red-600 hover:text-red-800 font-medium">Déconnexion</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="bg-white shadow rounded-xl p-8">
            <h2 class="text-2xl font-semibold mb-6">Modifier les informations de {{ utilisateur.prenom }} {{ utilisateur.nom }}</h2>

            <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                    <input type="text" name="nom" value="{{ utilisateur.nom }}" required class="block w-full border-gray-300 rounded-md shadow-sm focus:border-primary focus:ring-primary px-4 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
                    <input type="text" name="prenom" value="{{ utilisateur.prenom }}" required class="block w-full border-gray-300 rounded-md shadow-sm focus:border-primary focus:ring-primary px-4 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
                    <input type="text" name="numtel" value="{{ utilisateur.numtel }}" required class="block w-full border-gray-300 rounded-md shadow-sm focus:border-primary focus:ring-primary px-4 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label>
                    <input type="text" name="adresse" value="{{ utilisateur.adresse }}" required class="block w-full border-gray-300 rounded-md shadow-sm focus:border-primary focus:ring-primary px-4 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" value="{{ utilisateur.email }}" required class="block w-full border-gray-300 rounded-md shadow-sm focus:border-primary focus:ring-primary px-4 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe (laisser vide pour ne pas changer)</label>
                    <input type="password" name="mot_de_passe" class="block w-full border-gray-300 rounded-md shadow-sm focus:border-primary focus:ring-primary px-4 py-2">
                </div>

                <div class="md:col-span-2 mt-6">
                    <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-medium py-3 px-6 rounded-lg shadow-md hover:shadow-lg transition duration-200">
                        Enregistrer les modifications
                    </button>
                </div>
            </form>

            <p class="mt-8 text-center">
                <a href="{{ url_for('gestion_utilisateurs') }}" class="text-primary hover:text-primaryDark font-medium">
                    ← Retour à la liste des utilisateurs
                </a>
            </p>
        </div>
    </main>
</body>
</html>
